name: e_qollanma
description: E-Qo'llanma — Chizmachilik fani bo'yicha o'quv platformasi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Navigation ────────────────────────────────────────────────
  go_router: ^13.2.0

  # ── Network ───────────────────────────────────────────────────
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # ── Local Storage ─────────────────────────────────────────────
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # ── Localization ──────────────────────────────────────────────
  easy_localization: ^3.0.7

  # ── Animation ─────────────────────────────────────────────────
  lottie: ^3.1.0

  # ── Video ─────────────────────────────────────────────────────
  youtube_player_flutter: ^9.0.3
  video_player: ^2.8.6

  # ── PDF ───────────────────────────────────────────────────────
  flutter_pdfview: ^1.3.2

  # ── Image ─────────────────────────────────────────────────────
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # ── UI ────────────────────────────────────────────────────────
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1
  iconsax: ^0.0.8
  fluttertoast: ^8.2.8
  modal_bottom_sheet: ^3.0.0
  path_provider: ^2.1.3
  package_info_plus: ^6.0.0

  # ── Validation ────────────────────────────────────────────────
  form_validator: ^2.1.1

  # ── URL ───────────────────────────────────────────────────────
  url_launcher: ^6.3.0

  # ── Connectivity ──────────────────────────────────────────────
  connectivity_plus: ^6.0.3

  # ── Misc ──────────────────────────────────────────────────────
  intl: ^0.20.2
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/translations/
